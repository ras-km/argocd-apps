apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: hello=rkdockerhub420/hello-world-ui
    argocd-image-updater.argoproj.io/hello.update-strategy: latest
    argocd-image-updater.argoproj.io/hello.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/hello.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-credentials-secret: git-creds


spec:
  project: default

  source:
    repoURL: https://github.com/ras-km/hello-world-helm.git
    targetRevision: main
    path: hello-world
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: hello-world

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  
